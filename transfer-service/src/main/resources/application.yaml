spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:postgresql://${DB_HOST_TRANSFER:localhost}:${DB_PORT_TRANSFER:5435}/${DB_NAME_TRANSFER:transfer_repository}
    username: ${DB_USER_TRANSFER:transferuser}
    password: ${DB_PASS_TRANSFER:transferpass}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    contexts: dev
    change-log: db/changelog/db.changelog-master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
          jwk-set-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm/protocol/openid-connect/certs

      client:
        registration:
          transfer-service:
            provider: keycloak
            client-id: ${OAUTH2_CLIENT_ID_TRANSFER}
            client-secret: ${OAUTH2_SECRET_TRANSFER}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm

  cloud:
    loadbalancer:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        enabled: true
      config:
        enabled: false
        defaultContext: application
        data-key: data
      enabled: false
  config:
    import: "optional:consul:"

  kafka:
    admin:
      auto-create: false #ignore NewTopic in config
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      #Garanties delivery + at-least-once
      acks: all
      retries: ${PRODUCER_RETRIES:3}

      # Batching and timeouts (optional)
      batch-size: ${PRODUCER_BATCH_SIZE:16384B}
      buffer-memory: ${PRODUCER_BUFFER_MEMORY:33554432B}
      properties:
        linger.ms: ${PRODUCER_LINGER_MS:0}                # without batching
        delivery.timeout.ms: ${PRODUCER_DELIVERY_TIMEOUT_MS:120000}
        request.timeout.ms: ${PRODUCER_REQUEST_TIMEOUT_MS:30000}
        max.in.flight.requests.per.connection: ${PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION:5}   # order is not important here
        #exactly-once
        #enable.idempotence: true

transfer:
  account-service:
    baseUrl: ${ACCOUNT_SERVICE_URL:http://account-service}

logging:
  level:
    com.alex.bank.transfer: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: DEBUG
    root: WARN
  #file:
    #name: ${APP_DIR_TRANSFER:/home/alexlakers}/${spring.application.name}/app.log

resilience4j:
  circuitbreaker:
    instances:
      circuit-account-service:
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 4
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        failure-rate-threshold: 50
        sliding-window-type: count_based
        minimum-number-of-calls: 8

  retry:
    instances:
      retry-account-service:
        wait-duration: 1s
        max-attempts: 4
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
management:
  endpoint:
    health:
      probes:
        enabled: true

  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1

  endpoints:
    web:
      exposure:
        include: health
server:
  port: ${APP_PORT_TRANSFER:8085}