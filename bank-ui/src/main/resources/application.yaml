server:
  port: ${APP_PORT_UI:8083}
  forward-headers-strategy: framework

spring:
  application:
    name: bank-ui

  security:
    oauth2:
      client:
        provider:
          keycloak:
            #issuer-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/bank-realm
            issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: ${OAUTH2_CLIENT_ID_UI}
            client-secret: ${OAUTH2_SECRET_UI}
            authorization-grant-type: authorization_code
            scope: openid, profile, email
            redirect-uri: ${APP_BASE_URL:http://localhost:8083}/login/oauth2/code/keycloak
            provider: keycloak

  cloud:
    loadbalancer:
      enabled: false
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        enabled: false
      config:
        enabled: false
        defaultContext: application
        data-key: data
      enabled: false
  config:
    import: "optional:consul:"

bank:
  services:
    gateway:
      url: ${GATEWAY_API_URL:http://api-gateway:8888}
    account:
      url: ${ACCOUNT_SERVICE_URL:http://account-service:8080}
    transfer:
      url: ${TRANSFER_SERVICE_URL:http://transfer-service:8080}
    cash:
      url: ${CASH_SERVICE_URL:http://cash-notification:8080}

resilience4j:
  circuitbreaker:
    instances:
      circuit-account-service:
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 4
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        failure-rate-threshold: 50
        sliding-window-type: count_based
        minimum-number-of-calls: 8

  retry:
    instances:
      retry-account-service:
        wait-duration: 1s
        max-attempts: 4
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    root: WARN
    com.alex.bank.ui: DEBUG
    #com.alex.bank.ui.config: DEBUG
    #org.springframework.security: DEBUG
    #org.springframework.web.client: DEBUG
  #file:
    #name: ${APP_DIR_UI:/home/alexlakers}/${spring.application.name}/app.log
management:
  endpoint:
    health:
      probes:
        enabled: true

  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://127.0.0.1:9411/api/v2/spans} # Эндпоинт Zipkin для приёма спанов
  tracing:
    sampling:
      probability: 0

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus