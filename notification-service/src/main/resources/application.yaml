spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST_NOTIFICATION:localhost}:${DB_PORT_NOTIFICATION:5436}/${DB_NAME_NOTIFICATION:notification_repository}
    username: ${DB_USER_NOTIFICATION:notificationuser}
    password: ${DB_PASS_NOTIFICATION:notificationpass}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    contexts: dev
    change-log: db/changelog/db.changelog-master.xml
  security:
    oauth2:
      resourceserver:
       jwt:
         issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
         jwk-set-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm/protocol/openid-connect/certs
  cloud:
    loadbalancer:
      enabled: true
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        enabled: false
      config:
        enabled: true
        defaultContext: application
        data-key: data
      enabled: true
  config:
    import: "optional:consul:"

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    root: WARN
  #file:
    #name: ${APP_DIR_NOTIF:/home/alexlakers}/${spring.application.name}/app.log
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
server:
  port: ${APP_PORT_NOTIF:8086}