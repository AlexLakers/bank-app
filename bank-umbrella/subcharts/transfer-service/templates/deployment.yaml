apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transfer-service.fullname" . }}
  labels:
    {{- include "transfer-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "transfer-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "transfer-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.servicePort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "transfer-service.fullname" . }}-config
          env:
            - name: DB_PASS_TRANSFER		#from steteful secret
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-stateful
                  key: postgres-password
            - name: OAUTH2_SECRET_TRANSFER    #from current secret
              valueFrom:
                secretKeyRef:
                  name: {{ include "transfer-service.fullname" . }}-secrets
                  key: OAUTH2_SECRET_TRANSFER
                    #Probes
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.servicePort }}
            initialDelaySeconds: 30 
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.servicePort }}
            initialDelaySeconds: 40
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
