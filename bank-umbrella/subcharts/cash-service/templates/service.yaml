apiVersion: v1
kind: Service
metadata:
  name: {{ include "cash-service.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
    {{- include "cash-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.servicePort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cash-service.selectorLabels" . | nindent 4 }}
