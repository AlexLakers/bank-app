apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cash-service.fullname" . }}-secrets
  labels:
    {{- include "cash-service.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASS_CASH: {{ .Values.database.password | b64enc | quote }}
  OAUTH2_SECRET_CASH: {{ .Values.keycloak.clientSecret | b64enc | quote }}
