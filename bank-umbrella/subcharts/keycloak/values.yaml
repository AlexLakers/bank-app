# Default values for keycloak.
replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent
  tag: "24.0.2"

nameOverride: ""
fullnameOverride: ""

admin:
  login: admin
  password: ""

hostname: ""

#httpPort: 8080

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 31080

realmImport:
  enabled: true
  filename: realm-export.json


resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
