apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-keycloak"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          curl -f http://{{ .Release.Name }}-keycloak:8080/realms/bank-realm/.well-known/openid-configuration || exit 1
  restartPolicy: Never
