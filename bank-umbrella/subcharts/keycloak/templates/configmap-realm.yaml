{{- if .Values.realmImport.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-realm
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  {{ .Values.realmImport.filename }}: |
{{ .Files.Get .Values.realmImport.filename | indent 4 }}
{{- end }}
