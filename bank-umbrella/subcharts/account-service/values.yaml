replicaCount: 1

image:
  repository: account
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

database:
  host: "{{ .Release.Name }}-postgres-stateful-0.{{ .Release.Name }}-postgres-stateful.{{ .Release.Namespace }}.svc.cluster.local"
  port: 5432
  name: accountdb
  user: postgres
  password: ""

keycloak:
  host: "{{ .Release.Name }}-keycloak"
  port: 8080
  realm: bank-realm
  clientId: "account-service"
  clientSecret: ""

services:
  notificationServiceUrl: "http://{{ .Release.Name }}-notification-service:8086"

keycloakExternalUrl: "http://192.168.49.2:31080"
servicePort: 8082

resources: {}
