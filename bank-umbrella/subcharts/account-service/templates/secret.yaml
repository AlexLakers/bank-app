apiVersion: v1
kind: Secret
metadata:
  name: {{ include "account-service.fullname" . }}-secrets
  labels:
    {{- include "account-service.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASS_ACCOUNT: {{ .Values.database.password | b64enc | quote }}
  OAUTH2_SECRET_ACCOUNT: {{ .Values.keycloak.clientSecret | b64enc | quote }}
