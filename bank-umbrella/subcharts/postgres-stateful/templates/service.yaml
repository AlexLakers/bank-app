apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres-stateful.fullname" . }}
  labels:
    {{- include "postgres-stateful.labels" . | nindent 4 }}
spec:
  clusterIP: None  # headless
  selector:
    {{- include "postgres-stateful.selectorLabels" . | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
