# templates/kafka.yaml
# Создание пула узлов (два брокера, выполняют роли и брокера, и контроллера)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  labels:
    strimzi.io/cluster: bank-kafka
spec:
  replicas: 2
  roles:
    - broker
    - controller
  storage:
    type: persistent-claim
    size: 100Mi                # очень маленький диск, поэтому жёстко ограничиваем retention
    deleteClaim: false
---
# Основной ресурс Kafka
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: bank-kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # Отключаем автоматическое создание топиков
      auto.create.topics.enable: false

      # Ограничения хранения (глобальные, могут быть переопределены в топиках)
      log.retention.ms: 86400000          # 24 часа
      log.retention.bytes: 15728640       # 15 МБ на партицию
      segment.bytes: 10485760             # 10 МБ – размер сегмента, влияет на частоту очистки

      # Параметры по умолчанию для топиков
      num.partitions: 2
      default.replication.factor: 2
      min.insync.replicas: 1

  entityOperator:
    topicOperator: {}
---
# Топики с индивидуальными настройками (переопределяют глобальные)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: account-events
  labels:
    strimzi.io/cluster: bank-kafka
spec:
  partitions: 2
  replicas: 2
  config:
    retention.ms: 86400000
    retention.bytes: 15728640
    segment.bytes: 10485760
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cash-events
  labels:
    strimzi.io/cluster: bank-kafka
spec:
  partitions: 2
  replicas: 2
  config:
    retention.ms: 86400000
    retention.bytes: 15728640
    segment.bytes: 10485760
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transfer-events
  labels:
    strimzi.io/cluster: bank-kafka
spec:
  partitions: 2
  replicas: 2
  config:
    retention.ms: 86400000
    retention.bytes: 15728640
    segment.bytes: 10485760
    cleanup.policy: delete
