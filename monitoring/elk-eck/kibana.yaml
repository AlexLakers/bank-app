apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: kibana
  namespace: test
spec:
  version: 8.12.0
  count: 1
  elasticsearchRef:
    name: elasticsearch
  config:
    server:
      ssl:
        enabled: false
      host: "0.0.0.0"
    elasticsearch:
      hosts: http://elasticsearch-es-http.test.svc.cluster.local:9200
  podTemplate:
    spec:
      containers:
      - name: kibana
        readinessProbe:
          httpGet:
            path: /
            port: 5601
          initialDelaySeconds: 10
          periodSeconds: 10
  http:
    service:
      spec:
        type: NodePort
        ports:
          - port: 5601
            nodePort: 30601
