apiVersion: logstash.k8s.elastic.co/v1alpha1
kind: Logstash
metadata:
  name: logstash
  namespace: test
spec:
  version: 8.12.0
  count: 1
  elasticsearchRefs:
    - name: elasticsearch
      clusterName: elasticsearch
  pipelines:
    - pipeline.id: main
      config.string: |
        input {
          beats { port => 5044 }
        }
        output {
          elasticsearch {
            hosts => ["http://elasticsearch-es-http.test.svc.cluster.local:9200"]
            index => "app-logs-%{+YYYY.MM.dd}"
          }
        }
  podTemplate:
    spec:
      containers:
        - name: logstash
          resources:
            requests:
              memory: "1Gi"
              cpu: "0.5"
            limits:
              memory: "1Gi"
