services:
  consul:
    image: consul:1.15.4
    command: ["agent", "-dev", "-client=0.0.0.0"]
    ports:
      - "8500:8500"
    restart: always

  account-db:
    image: postgres:17.0
    ports:
      - "5433:5432"
    restart: always
    environment:
      - DB_HOST_PORT
      - POSTGRES_USER=accountuser
      - POSTGRES_PASSWORD=accountpass
      - POSTGRES_DB=account_repository
    volumes:
      - db-data-account:/var/lib/postgresql/data
    networks:
      backend-net:


  cash-db:
    image: postgres:17.0
    ports:
      - "5434:5432"
    restart: always
    environment:
      - DB_HOST_PORT
      - POSTGRES_USER=cashuser
      - POSTGRES_PASSWORD=cashpass
      - POSTGRES_DB=cash_repository
    volumes:
      - db-data-cash:/var/lib/postgresql/data
    networks:
      backend-net:

  transfer-db:
    image: postgres:17.0
    ports:
      - "5435:5432"
    restart: always
    environment:
      - DB_HOST_PORT
      - POSTGRES_USER=transferuser
      - POSTGRES_PASSWORD=transferpass
      - POSTGRES_DB=transfer_repository
    volumes:
      - db-data-transfer:/var/lib/postgresql/data
    networks:
      backend-net:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=localhost
    ports:
      - "8080:8080"
    restart: always
    command:
      - start-dev
      - --http-port=8080
    networks:
      backend-net:
        aliases:
          - keycloak

volumes:
  db-data-account:
  db-data-cash:
  db-data-transfer:

networks:
  backend-net: