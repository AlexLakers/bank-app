services:
  consul:
    image: consul:1.15.4
    command: ["agent", "-dev", "-client=0.0.0.0"]
    environment:
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    ports:
      - "${CONSUL_HOST_PORT}:${CONSUL_PORT}"
    restart: always
    networks:
      backend-net:

  account-db:
    image: postgres:17.0
    ports:
      - "${DB_HOST_PORT_ACCOUNT}:${DB_PORT_ACCOUNT}"
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER_ACCOUNT}
      - POSTGRES_PASSWORD=${DB_PASS_ACCOUNT}
      - POSTGRES_DB=${DB_NAME_ACCOUNT}
    volumes:
      - db-data-account:/var/lib/postgresql/data
    networks:
      backend-net:

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    image: account
    restart: always
    ports:
      - "${APP_HOST_PORT_ACCOUNT}:${APP_PORT_ACCOUNT}"
    environment:
      - DB_USER_ACCOUNT=${DB_USER_ACCOUNT}
      - DB_PASS_ACCOUNT=${DB_PASS_ACCOUNT}
      - DB_HOST_ACCOUNT=${DB_HOST_ACCOUNT}
      - DB_PORT_ACCOUNT=${DB_PORT_ACCOUNT}
      - DB_NAME_ACCOUNT=${DB_NAME_ACCOUNT}
      - APP_DIR_ACCOUNT=${APP_DIR_ACCOUNT}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - OAUTH2_CLIENT_ID_ACCOUNT=${OAUTH2_CLIENT_ID_ACCOUNT}
      - OAUTH2_SECRET_ACCOUNT=${OAUTH2_SECRET_ACCOUNT}
      - KEYCLOAK_HOST=${KEYCLOAK_HOST}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT}
      - CONSUL_HOST=${CONSUL_HOST}
      - CONSUL_PORT=${CONSUL_PORT}
    networks:
      backend-net:
    depends_on:
      - account-db
      - keycloak

  bank-ui:
    build:
      context: .
      dockerfile: bank-ui/Dockerfile
    image: ui
    restart: always
    ports:
      - "${APP_HOST_PORT_UI}:${APP_PORT_UI}"
    environment:
      - APP_DIR_UI=${APP_DIR_UI}
      - OAUTH2_CLIENT_ID_UI=${OAUTH2_CLIENT_ID_UI}
      - OAUTH2_SECRET_UI=${OAUTH2_SECRET_UI}
      - KEYCLOAK_HOST=${KEYCLOAK_HOST}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT}
      - CONSUL_HOST=${CONSUL_HOST}
      - CONSUL_PORT=${CONSUL_PORT}
    networks:
      backend-net:
    depends_on:
      - keycloak

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: gateway
    restart: always
    ports:
      - "${APP_HOST_PORT_GATEWAY}:${APP_PORT_GATEWAY}"
    environment:
      - APP_DIR_GATEWAY=${APP_DIR_GATEWAY}
      - KEYCLOAK_HOST=${KEYCLOAK_HOST}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT}
      - CONSUL_HOST=${CONSUL_HOST}
      - CONSUL_PORT=${CONSUL_PORT}
    networks:
      backend-net:
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_LOGIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASS}
      - KC_HOSTNAME=${KEYCLOAK_HOST}
    #  - KC_HOSTNAME_ALIASES=${KEYCLOAK_HOST_ALIASES}
    ports:
      - "${KEYCLOAK_HOST_PORT}:${KEYCLOAK_PORT}"
    restart: always
    command:
      - start-dev
      - --http-port=${KEYCLOAK_PORT}
      - --import-realm
     # - --features=preview
     # - --verbose
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      backend-net:
        aliases:
          - keycloak

volumes:
  db-data-account:
  db-data-cash:
  db-data-transfer:

networks:
  backend-net: