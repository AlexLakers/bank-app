spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST_ACCOUNT:localhost}:${DB_PORT_ACCOUNT:5433}/${DB_NAME_ACCOUNT:account_repository}
    username: ${DB_USER_ACCOUNT:accountuser}
    password: ${DB_PASS_ACCOUNT:accountpass}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  kafka:
    admin:
      auto-create: false #ignore NewTopic in config
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      #Garanties delivery + at-least-once
      acks: all
      retries: 3

      # Batching and timeouts (optional)
      batch-size: 16384
      buffer-memory: 33554432
      properties:
        linger.ms: 0                # without batching
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        max.in.flight.requests.per.connection: 5   # order is not important here
        #exactly-once
        #enable.idempotence: true



  liquibase:
    contexts: dev
    change-log: db/changelog/db.changelog-master.xml

  security:
    oauth2:
      client:
        registration:
          account-service:
            provider: keycloak
            client-id: ${OAUTH2_CLIENT_ID_ACCOUNT}
            client-secret: ${OAUTH2_SECRET_ACCOUNT}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
          jwk-set-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm/protocol/openid-connect/certs
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        enabled: false
      config:
        enabled: false
        defaultContext: application
        data-key: data
      enabled: false
  config:
    import: "optional:consul:"

logging:
  level:
    com.alex.bank.account: INFO
    root: WARN
  #file:
    #name: ${APP_DIR_ACCOUNT:/home/alexlakers}/${spring.application.name}/app.log

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${APP_PORT_ACCOUNT:8082}
