spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST_ACCOUNT:localhost}:${DB_PORT_ACCOUNT:5433}/${DB_NAME_ACCOUNT:account_repository}
    username: ${DB_USER_ACCOUNT:accountuser}
    password: ${DB_PASS_ACCOUNT:accountpass}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  kafka:
    admin:
      auto-create: false #ignore NewTopic in config
    bootstrap-servers: ${KAFKA_URL}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      #Garanties delivery + at-least-once
      acks: all
      retries: ${PRODUCER_RETRIES:3}

      # Batching and timeouts (optional)
      batch-size: ${PRODUCER_BATCH_SIZE:16384B}
      buffer-memory: ${PRODUCER_BUFFER_MEMORY:33554432B}
      properties:
        linger.ms: ${PRODUCER_LINGER_MS:0}                # without batching
        delivery.timeout.ms: ${PRODUCER_DELIVERY_TIMEOUT_MS:120000}
        request.timeout.ms: ${PRODUCER_REQUEST_TIMEOUT_MS:30000}
        max.in.flight.requests.per.connection: ${PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION:5}   # order is not important here
        #exactly-once
        #enable.idempotence: true



  liquibase:
    contexts: dev
    change-log: db/changelog/db.changelog-master.xml

  security:
    oauth2:
      client:
        registration:
          account-service:
            provider: keycloak
            client-id: ${OAUTH2_CLIENT_ID_ACCOUNT}
            client-secret: ${OAUTH2_SECRET_ACCOUNT}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm
          jwk-set-uri: ${KEYCLOAK_EXTERNAL_URL:http://keycloak:8080}/realms/bank-realm/protocol/openid-connect/certs
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        enabled: false
      config:
        enabled: false
        defaultContext: application
        data-key: data
      enabled: false
  config:
    import: "optional:consul:"

logging:
  level:
    com.alex.bank.account: DEBUG
    #io.micrometer.tracing: DEBUG
    #org.springframework.kafka: DEBUG
    #org.springframework.jdbc: DEBUG
    #com.zaxxer.hikari: DEBUG
    #io.micrometer.observation: DEBUG
    #zipkin2.reporter: DEBUG
    root: WARN
    #file:
    #name: ${APP_DIR_ACCOUNT:/home/alexlakers}/${spring.application.name}/app.log

management:
  endpoint:
    health:
      probes:
        enabled: true

  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus


server:
  port: ${APP_PORT_ACCOUNT:8082}
