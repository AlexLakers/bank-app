spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_HOST_PORT:5433}/${DB_NAME:account_repository}
    username: ${DB_USER:accountuser}
    password: ${DB_PASS:accountpass}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    contexts: dev
    change-log: db/changelog/db.changelog-master.xml

  security:
    oauth2:
      client:
        registration:
          account-service:
            provider: keycloak
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-realm
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/bank-realm
          jwk-set-uri: http://localhost:8080/realms/bank-realm/protocol/openid-connect/certs


logging:
  level:
    root: WARN
    com.alex.bank.account: INFO
  file:
    name: ${APP_DIR:/home/alexlakers/account-service}/app.log

server:
  port: 8082